<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reporte de Faltantes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #f4f1ec; --surface: #ffffff; --border: #e2ddd6; --border-focus: #2d5a3d;
    --text: #1a1a18; --text-muted: #7a756e; --accent: #2d5a3d; --accent-light: #e8f0ea;
    --radius: 10px; --shadow: 0 4px 12px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
  
  /* Header */
  .header { background: var(--accent); color: #fff; padding: 1.2rem; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; gap: 12px; }
  .progress-bar { height: 4px; background: rgba(255,255,255,0.2); position: sticky; top: 58px; z-index: 1000; }
  .progress-fill { height: 100%; background: #a8d5b5; width: 0%; transition: 0.4s; }

  .container { max-width: 500px; margin: 2rem auto; padding: 0 1rem; }
  .step { display: none; }
  .step.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .step-title { font-size: 24px; font-weight: 600; margin-bottom: 1.5rem; }
  
  /* Estilo Combo / Autocomplete */
  .field { margin-bottom: 1.2rem; position: relative; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  
  .combo-container { position: relative; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius); transition: 0.2s; }
  .combo-container:focus-within { border-color: var(--border-focus); box-shadow: 0 0 0 3px var(--accent-light); }
  .combo-input { width: 100%; border: none; padding: 12px; border-radius: var(--radius); outline: none; font-size: 15px; background: transparent; }
  .combo-dropdown { 
    position: absolute; top: 100%; left: 0; right: 0; background: #fff; 
    border: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); 
    max-height: 200px; overflow-y: auto; z-index: 999; display: none; box-shadow: var(--shadow);
  }
  .combo-item { padding: 10px 12px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #f8f8f8; }
  .combo-item:hover { background: var(--accent-light); color: var(--accent); }
  .combo-container.disabled { background: #f0f0f0; opacity: 0.7; pointer-events: none; }

  /* Botones y Cards */
  .btn-next { width: 100%; background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: var(--radius); font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
  .btn-next:disabled { background: #ccc; }
  .item-card { background: #fff; padding: 12px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 50px; font-size: 14px; display: none; z-index: 10000; }
</style>
</head>
<body>

<div class="header">
  <div style="font-weight:bold">Reporte de Faltantes</div>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

<div class="container">
  <div class="step active" id="step1">
    <div class="step-title">Verificar Identidad</div>
    <div id="g_id_onload" data-client_id="926135554390-f39b02cdi8ong7nnh00j0vkr8n2ek3a7.apps.googleusercontent.com" data-callback="handleCredentialResponse"></div>
    <div class="g_id_signin" data-type="standard"></div>
    <div style="margin: 1.5rem 0; text-align: center; color: var(--text-muted); font-size: 12px;">o ingresa manualmente</div>
    <div class="field">
      <input type="email" id="manualEmail" class="combo-input" style="border: 1.5px solid var(--border)" placeholder="correo@empresa.com">
    </div>
    <button class="btn-next" onclick="validarManual()">Continuar</button>
  </div>

  <div class="step" id="step2">
    <div class="step-title">Ubicación</div>
    
    <div class="field">
      <label>Canal</label>
      <div class="combo-container" id="comboCanal">
        <input type="text" class="combo-input" placeholder="Buscar canal..." oninput="filtrarCombo('Canal')">
        <div class="combo-dropdown"></div>
      </div>
    </div>

    <div class="field">
      <label>Departamento</label>
      <div class="combo-container" id="comboDep">
        <input type="text" class="combo-input" placeholder="Buscar departamento..." oninput="filtrarCombo('Dep')">
        <div class="combo-dropdown"></div>
      </div>
    </div>

    <div class="field">
      <label>Municipio</label>
      <div class="combo-container disabled" id="comboMun">
        <input type="text" class="combo-input" placeholder="Primero elige departamento..." oninput="filtrarCombo('Mun')">
        <div class="combo-dropdown"></div>
      </div>
    </div>

    <div class="field">
      <label>Sucursal</label>
      <div class="combo-container disabled" id="comboSuc">
        <input type="text" class="combo-input" placeholder="Primero elige municipio..." oninput="filtrarCombo('Suc')">
        <div class="combo-dropdown"></div>
      </div>
    </div>

    <button class="btn-next" onclick="irPaso(3)">Continuar</button>
  </div>

  <div class="step" id="step3">
    <div class="step-title">Productos</div>
    <div class="field">
      <label>Marca</label>
      <div class="combo-container" id="comboMarca">
        <input type="text" class="combo-input" placeholder="Buscar marca..." oninput="filtrarCombo('Marca')">
        <div class="combo-dropdown"></div>
      </div>
    </div>
    <div class="field">
      <label>Producto</label>
      <div class="combo-container disabled" id="comboProd">
        <input type="text" class="combo-input" placeholder="Selecciona marca..." oninput="filtrarCombo('Prod')">
        <div class="combo-dropdown"></div>
      </div>
    </div>
    <div class="field">
      <label>Cantidad</label>
      <input type="number" id="cant" class="combo-input" style="border:1.5px solid var(--border)" value="1" min="1">
    </div>
    <button class="btn-next" style="background:var(--accent-light); color:var(--accent)" onclick="agregarProd()">+ Agregar a la lista</button>
    <div id="itemsList" style="margin-top:1rem"></div>
    <button class="btn-next" onclick="irPaso(4)">Revisar Reporte</button>
  </div>

  <div class="step" id="step4">
    <div class="step-title">Finalizar</div>
    <div id="resumen" style="font-size:14px; margin-bottom:1rem; padding:10px; background:#fff; border-radius:8px"></div>
    <div class="field">
      <label>Observaciones</label>
      <textarea id="obs" class="combo-input" style="border:1.5px solid var(--border); height:80px" placeholder="Opcional..."></textarea>
    </div>
    <button class="btn-next" id="btnEnviar" onclick="enviar()">Enviar Reporte</button>
  </div>

  <div id="success" style="display:none; text-align:center; padding:2rem">
    <div style="font-size:50px">✅</div>
    <h2>¡Enviado con éxito!</h2>
    <p id="cod" style="font-family:monospace; font-weight:bold; margin:1rem 0"></p>
    <button class="btn-next" onclick="location.reload()">Nuevo Reporte</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz_M02Uo6Dh9wzgdTc0wyyyCkrosooWRmbZva5sjOarsevmupqdmxJjOMgxl5wspizn1g/exec";
let datos = {}, usuario = {}, seleccionado = {}, listaAgregados = [];

// INICIO: Cargar datos
async function init() {
  const res = await fetch(APPS_SCRIPT_URL + "?action=getListas");
  datos = await res.json();
  llenarCombo('Canal', datos.canales);
  llenarCombo('Dep', datos.departamentos);
  llenarCombo('Marca', datos.marcas);
}

// LÓGICA DE COMBOS (AUTOSUGGEST)
function llenarCombo(id, array) {
  const container = document.getElementById('combo' + id);
  const dropdown = container.querySelector('.combo-dropdown');
  dropdown.innerHTML = '';
  array.forEach(val => {
    const item = document.createElement('div');
    item.className = 'combo-item';
    item.textContent = val;
    item.onclick = () => seleccionarItem(id, val);
    dropdown.appendChild(item);
  });
}

function filtrarCombo(id) {
  const container = document.getElementById('combo' + id);
  const input = container.querySelector('input').value.toLowerCase();
  const dropdown = container.querySelector('.combo-dropdown');
  const items = dropdown.querySelectorAll('.combo-item');
  
  let visible = 0;
  items.forEach(item => {
    const match = item.textContent.toLowerCase().includes(input);
    item.style.display = match ? 'block' : 'none';
    if(match) visible++;
  });
  dropdown.style.display = visible > 0 ? 'block' : 'none';
}

function seleccionarItem(id, val) {
  const container = document.getElementById('combo' + id);
  container.querySelector('input').value = val;
  container.querySelector('.combo-dropdown').style.display = 'none';
  seleccionado[id] = val;

  // Lógica de dependencia
  if(id === 'Dep') {
    const muns = datos.municipios[val] || [];
    document.getElementById('comboMun').classList.remove('disabled');
    llenarCombo('Mun', muns);
  }
  if(id === 'Mun' || id === 'Canal') {
    if(seleccionado.Canal && seleccionado.Mun) {
      const sucs = datos.sucursales.filter(s => s.canal === seleccionado.Canal && s.mun === seleccionado.Mun).map(s => s.suc);
      document.getElementById('comboSuc').classList.remove('disabled');
      llenarCombo('Suc', sucs);
    }
  }
  if(id === 'Marca') {
    const prods = datos.productos[val] || [];
    document.getElementById('comboProd').classList.remove('disabled');
    llenarCombo('Prod', prods);
  }
}

// CERRAR DROPDOWNS AL CLIC AFUERA
document.addEventListener('click', (e) => {
  if(!e.target.closest('.combo-container')) {
    document.querySelectorAll('.combo-dropdown').forEach(d => d.style.display = 'none');
  }
});

// LOGIN Y NAVEGACIÓN
function handleCredentialResponse(response) {
  const payload = JSON.parse(atob(response.credential.split('.')[1]));
  validar(payload.email);
}
function validarManual() { validar(document.getElementById('manualEmail').value); }
function validar(email) {
  const user = datos.ejecutivos.find(e => e.correo.toLowerCase() === email.toLowerCase().trim());
  if(user) { usuario = user; irPaso(2); } else { msg("Correo no autorizado"); }
}

function irPaso(p) {
  if(p === 3 && !seleccionado.Suc) return msg("Elige sucursal");
  if(p === 4 && listaAgregados.length === 0) return msg("Agrega productos");
  
  if(p === 4) {
    document.getElementById('resumen').innerHTML = `<b>Sucursal:</b> ${seleccionado.Suc}<br><b>Productos:</b> ${listaAgregados.length}`;
  }
  
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + p).classList.add('active');
  document.getElementById('progressFill').style.width = ((p-1)/3)*100 + "%";
}

// PRODUCTOS
function agregarProd() {
  if(!seleccionado.Prod) return msg("Elige producto");
  listaAgregados.push({ marca: seleccionado.Marca, producto: seleccionado.Prod, cantidad: document.getElementById('cant').value });
  render();
  document.getElementById('comboProd').querySelector('input').value = '';
  seleccionado.Prod = null;
}

function render() {
  document.getElementById('itemsList').innerHTML = listaAgregados.map((p, i) => `
    <div class="item-card">
      <div><b>${p.producto}</b><br><small>${p.marca} | Cant: ${p.cantidad}</small></div>
      <button onclick="listaAgregados.splice(${i},1);render()" style="border:none; color:red; background:none; cursor:pointer">✕</button>
    </div>
  `).join('');
}

// ENVIAR
async function enviar() {
  const btn = document.getElementById('btnEnviar');
  btn.disabled = true; btn.textContent = "Enviando...";
  
  const payload = {
    ejecutivo: usuario.nombre, correo: usuario.correo,
    canal: seleccionado.Canal, departamento: seleccionado.Dep, municipio: seleccionado.Mun, sucursal: seleccionado.Suc,
    productos: listaAgregados, urgencia: "Media", observaciones: document.getElementById('obs').value
  };

  const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
  const r = await res.json();
  if(r.success) {
    document.getElementById('step4').style.display = 'none';
    document.getElementById('success').style.display = 'block';
    document.getElementById('cod').textContent = r.codigo;
  }
}

function msg(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

init();
</script>
</body>
</html>
